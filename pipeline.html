<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animated RAG Pipeline</title>
  <style>
    :root {
      --bg: #0b0f1a;
      --stroke-soft: rgba(148, 163, 184, 0.14);
      --text: #f8fafc;
      --muted: #94a3b8;
      --primary: #6366f1;
      --accent: #10b981;
      --cyan: #38bdf8;
      --warning: #f59e0b;
      --rose: #fb7185;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 10% 5%, rgba(99, 102, 241, 0.22), transparent 30%),
        radial-gradient(circle at 90% 95%, rgba(16, 185, 129, 0.14), transparent 30%),
        var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .stage {
      width: min(1500px, 97vw);
      aspect-ratio: 16 / 9;
      position: relative;
      overflow: hidden;
      border-radius: 30px;
      border: 1px solid rgba(148, 163, 184, 0.22);
      background: linear-gradient(180deg, rgba(15, 23, 42, 0.96), rgba(12, 18, 31, 0.98));
      box-shadow: 0 30px 100px rgba(0, 0, 0, 0.48), inset 0 1px 0 rgba(255,255,255,0.05);
    }

    svg { width: 100%; height: 100%; display: block; }

    .headline { fill: var(--text); font-size: 32px; font-weight: 900; letter-spacing: -0.04em; }
    .subhead { fill: var(--muted); font-size: 15px; font-weight: 500; }
    .section-title { fill: #9fb4d0; font-size: 13px; font-weight: 850; letter-spacing: 0.08em; text-transform: uppercase; }
    .section-chip { fill: rgba(15, 23, 42, 0.96); stroke: rgba(148, 163, 184, 0.16); stroke-width: 1; }
    .lane-line { stroke: var(--stroke-soft); stroke-width: 1; }

    .node-bg {
      fill: rgba(15, 23, 42, 0.965);
      stroke: rgba(148, 163, 184, 0.27);
      stroke-width: 1.4;
      filter: drop-shadow(0 14px 24px rgba(0,0,0,0.22));
    }

    .node-title { fill: var(--text); font-size: 16px; font-weight: 850; letter-spacing: -0.02em; }
    .node-title-small { fill: var(--text); font-size: 14px; font-weight: 850; letter-spacing: -0.02em; }
    .node-subtitle { fill: var(--muted); font-size: 11.5px; font-weight: 500; }
    .tiny { fill: rgba(248,250,252,0.8); font-size: 10.5px; font-weight: 750; }

    .icon-bg { fill: rgba(99,102,241,0.13); stroke: rgba(99,102,241,0.44); stroke-width: 1.2; }
    .icon-green { fill: rgba(16,185,129,0.12); stroke: rgba(16,185,129,0.42); }
    .icon-cyan { fill: rgba(56,189,248,0.12); stroke: rgba(56,189,248,0.45); }
    .icon-yellow { fill: rgba(245,158,11,0.12); stroke: rgba(245,158,11,0.45); }
    .icon-rose { fill: rgba(251,113,133,0.12); stroke: rgba(251,113,133,0.45); }
    .doc-line { stroke: rgba(248,250,252,0.74); stroke-width: 2; stroke-linecap: round; }

    .flow {
      fill: none;
      stroke-width: 3.6;
      stroke-linecap: round;
      stroke-dasharray: 14 8;
      animation: dash 0.9s linear infinite;
      filter: drop-shadow(0 0 6px rgba(99,102,241,0.8));
    }
    .flow-main { stroke: url(#mainGradient); }
    .flow-branch { stroke: url(#branchGradient); animation-duration: 0.72s; }
    .flow-response { stroke: url(#responseGradient); animation-duration: 0.78s; }

    @keyframes dash { to { stroke-dashoffset: -22; } }

    .pulse .node-bg { animation: pulseNode 7.2s ease-in-out infinite; }
    .d1 .node-bg { animation-delay: 0s; }
    .d2 .node-bg { animation-delay: .45s; }
    .d3 .node-bg { animation-delay: .9s; }
    .d4 .node-bg { animation-delay: 1.35s; }
    .d5 .node-bg { animation-delay: 1.8s; }
    .d6 .node-bg { animation-delay: 2.25s; }
    .d7 .node-bg { animation-delay: 2.7s; }
    .d8 .node-bg { animation-delay: 3.15s; }
    .d9 .node-bg { animation-delay: 3.6s; }
    .d10 .node-bg { animation-delay: 4.05s; }
    .d11 .node-bg { animation-delay: 4.5s; }

    @keyframes pulseNode {
      0%, 9%, 100% { stroke: rgba(148, 163, 184, 0.27); filter: drop-shadow(0 14px 24px rgba(0,0,0,0.22)); }
      4.5% { stroke: rgba(99, 102, 241, 1); filter: drop-shadow(0 0 28px rgba(99,102,241,0.45)); }
    }

    .moving-dot { fill: var(--primary); filter: drop-shadow(0 0 8px rgba(99,102,241,0.9)); }
    .moving-dot.branch { fill: var(--cyan); filter: drop-shadow(0 0 8px rgba(56,189,248,0.9)); }
    .moving-dot.response { fill: var(--accent); filter: drop-shadow(0 0 8px rgba(16,185,129,0.9)); }
    .bar { animation: glow 1.5s ease-in-out infinite alternate; }
    @keyframes glow { from { opacity: .42; } to { opacity: 1; } }
    .cursor { animation: blink .8s steps(2,start) infinite; }
    @keyframes blink { 50% { opacity: 0; } }
  </style>
</head>
<body>
  <main class="stage">
    <svg viewBox="0 0 1500 844" aria-label="Animated project-specific RAG pipeline diagram">
      <defs>
        <linearGradient id="mainGradient" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="1500" y2="0">
          <stop offset="0%" stop-color="#38bdf8" />
          <stop offset="50%" stop-color="#818cf8" />
          <stop offset="100%" stop-color="#a78bfa" />
        </linearGradient>
        <linearGradient id="branchGradient" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="1500" y2="0">
          <stop offset="0%" stop-color="#10b981" />
          <stop offset="100%" stop-color="#38bdf8" />
        </linearGradient>
        <linearGradient id="responseGradient" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="1500" y2="0">
          <stop offset="0%" stop-color="#818cf8" />
          <stop offset="100%" stop-color="#22c55e" />
        </linearGradient>
        <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
          <path d="M2,2 L10,6 L2,10 Z" fill="#818cf8" />
        </marker>
      </defs>

      <text x="52" y="72" class="headline">Project RAG Pipeline</text>
      <text x="52" y="106" class="subhead">FastAPI query endpoints → workflow modes → hybrid retrieval (dense + BM25) → RRF → rerank → context → LLM → response + citations (SSE is transport)</text>

      <line x1="52" y1="278" x2="1448" y2="278" class="lane-line" />
      <line x1="52" y1="540" x2="1448" y2="540" class="lane-line" />

      <rect x="44" y="130" width="210" height="30" rx="15" class="section-chip" />
      <text x="60" y="150" class="section-title">1. Request Orchestration</text>
      <rect x="44" y="322" width="210" height="30" rx="15" class="section-chip" />
      <text x="60" y="342" class="section-title">2. Hybrid Retrieval</text>
      <rect x="44" y="584" width="238" height="30" rx="15" class="section-chip" />
      <text x="60" y="604" class="section-title">3. Generation & Delivery</text>

      <!-- Main upper flow -->
      <path class="flow flow-main" marker-end="url(#arrow)" d="M225 218 H318" />
      <path class="flow flow-main" marker-end="url(#arrow)" d="M473 218 H568" />
      <path class="flow flow-main" marker-end="url(#arrow)" d="M742 218 H824" />
      <path class="flow flow-main" marker-end="url(#arrow)" d="M996 218 H1086" />
      <path class="flow flow-main" marker-end="url(#arrow)" d="M1260 218 H1350" />
      <path class="flow flow-main" marker-end="url(#arrow)" d="M1409 274 C1409 328 1230 350 1043 372" />

      <!-- Branches from hybrid retrieval -->
      <path class="flow flow-branch" marker-end="url(#arrow)" d="M910 276 C860 320 620 328 485 372" />
      <path class="flow flow-branch" marker-end="url(#arrow)" d="M910 276 C910 318 878 328 835 372" />
      <path class="flow flow-branch" marker-end="url(#arrow)" d="M485 492 C530 526 608 526 651 492" />
      <path class="flow flow-branch" marker-end="url(#arrow)" d="M835 492 C790 526 710 526 651 492" />
      <path class="flow flow-response" marker-end="url(#arrow)" d="M724 410 C800 332 900 332 960 410" />

      <!-- Lower generation flow -->
      <path class="flow flow-main" marker-end="url(#arrow)" d="M1043 492 C1010 548 952 590 892 636" />
      <path class="flow flow-branch" marker-end="url(#arrow)" d="M655 272 C620 372 602 520 624 636" />
      <path class="flow flow-branch" marker-end="url(#arrow)" d="M738 696 H808" />
      <path class="flow flow-response" marker-end="url(#arrow)" d="M976 696 H1046" />
      <path class="flow flow-response" marker-end="url(#arrow)" d="M1202 696 H1272" />
      <path class="flow flow-response" marker-end="url(#arrow)" d="M396 272 C330 378 300 535 360 636" />

      <circle r="6" class="moving-dot">
        <animateMotion dur="5.4s" repeatCount="indefinite" path="M225 218 H318 M473 218 H568 M742 218 H824 M996 218 H1086 M1260 218 H1350 M1409 274 C1409 328 1230 350 1043 372" />
      </circle>
      <circle r="6" class="moving-dot branch">
        <animateMotion dur="4.2s" repeatCount="indefinite" path="M910 276 C860 320 620 328 485 372 M485 492 C530 526 608 526 651 492 M910 276 C910 318 878 328 835 372 M835 492 C790 526 710 526 651 492 M724 410 C800 332 900 332 960 410 M655 272 C620 372 602 520 624 636 M738 696 H808" />
      </circle>
      <circle r="6" class="moving-dot response">
        <animateMotion dur="3.6s" repeatCount="indefinite" path="M1043 492 C1010 548 952 590 892 636 M976 696 H1046 M1202 696 H1272 M396 272 C330 378 300 535 360 636" />
      </circle>

      <!-- Row 1: request orchestration -->
      <g class="pulse d1" transform="translate(84 164)">
        <rect class="node-bg" width="142" height="108" rx="22" />
        <rect class="icon-bg icon-cyan" x="40" y="20" width="62" height="38" rx="10" />
        <text class="tiny" x="71" y="44" text-anchor="middle">Ask</text>
        <text class="node-title" x="71" y="82" text-anchor="middle">User Query</text>
        <text class="node-subtitle" x="71" y="101" text-anchor="middle">question</text>
      </g>

      <g class="pulse d2" transform="translate(318 164)">
        <rect class="node-bg" width="156" height="108" rx="22" />
        <rect class="icon-bg" x="34" y="20" width="88" height="38" rx="10" />
        <text class="tiny" x="78" y="44" text-anchor="middle">/query</text>
        <text class="node-title" x="78" y="82" text-anchor="middle">FastAPI</text>
        <text class="node-subtitle" x="78" y="101" text-anchor="middle">/query/stream</text>
      </g>

      <g class="pulse d3" transform="translate(568 164)">
        <rect class="node-bg" width="174" height="108" rx="22" />
        <rect class="icon-bg icon-yellow" x="35" y="19" width="104" height="39" rx="10" />
        <text class="tiny" x="87" y="43" text-anchor="middle">mode</text>
        <text class="node-title-small" x="87" y="82" text-anchor="middle">WorkflowRunner</text>
        <text class="node-subtitle" x="87" y="101" text-anchor="middle">standard / advanced / compare</text>
      </g>
      <rect x="600" y="286" width="220" height="24" rx="12" class="section-chip" />
      <text x="612" y="302" class="tiny">advanced: gate → rewrite → critique → retry/refine → abstain</text>

      <g class="pulse d4" transform="translate(824 164)">
        <rect class="node-bg" width="172" height="108" rx="22" />
        <circle class="icon-bg icon-green" cx="86" cy="39" r="24" />
        <path d="M75 39 h22 M86 28 v22" stroke="#22c55e" stroke-width="3" stroke-linecap="round" />
        <text class="node-title-small" x="86" y="82" text-anchor="middle">Hybrid Retrieval</text>
        <text class="node-subtitle" x="86" y="101" text-anchor="middle">dense + sparse search</text>
      </g>

      <g class="pulse d7" transform="translate(1086 164)">
        <rect class="node-bg" width="174" height="108" rx="22" />
        <rect class="icon-bg" x="38" y="18" width="98" height="42" rx="11" />
        <text class="tiny" x="87" y="44" text-anchor="middle">rank merge</text>
        <text class="node-title" x="87" y="82" text-anchor="middle">RRF Fusion</text>
        <text class="node-subtitle" x="87" y="101" text-anchor="middle">reciprocal rank</text>
      </g>

      <g class="pulse d8" transform="translate(1350 164)">
        <rect class="node-bg" width="118" height="108" rx="22" />
        <g transform="translate(36 19)">
          <rect class="bar" x="0" y="24" width="9" height="28" rx="3" fill="#818cf8" />
          <rect class="bar" x="17" y="10" width="9" height="42" rx="3" fill="#38bdf8" style="animation-delay:.15s" />
          <rect class="bar" x="34" y="18" width="9" height="34" rx="3" fill="#10b981" style="animation-delay:.3s" />
        </g>
        <text class="node-title" x="59" y="82" text-anchor="middle">Rerank</text>
        <text class="node-subtitle" x="59" y="101" text-anchor="middle">re-score</text>
      </g>

      <!-- Row 2: hybrid branches -->
      <g class="pulse d5" transform="translate(410 372)">
        <rect class="node-bg" width="150" height="120" rx="22" />
        <circle class="icon-bg" cx="75" cy="40" r="24" />
        <text class="tiny" x="75" y="45" text-anchor="middle">emb</text>
        <text class="node-title-small" x="75" y="84" text-anchor="middle">Dense</text>
        <text class="node-subtitle" x="75" y="103" text-anchor="middle">embedding similarity</text>
      </g>

      <g class="pulse d5" transform="translate(760 372)">
        <rect class="node-bg" width="150" height="120" rx="22" />
        <rect class="icon-bg icon-cyan" x="38" y="22" width="74" height="40" rx="10" />
        <text class="tiny" x="75" y="47" text-anchor="middle">BM25</text>
        <text class="node-title-small" x="75" y="84" text-anchor="middle">Sparse</text>
        <text class="node-subtitle" x="75" y="103" text-anchor="middle">keyword scoring</text>
      </g>

      <g class="pulse d6" transform="translate(578 384)">
        <rect class="node-bg" width="146" height="108" rx="22" />
        <rect class="icon-bg icon-green" x="33" y="19" width="80" height="38" rx="10" />
        <text class="tiny" x="73" y="43" text-anchor="middle">top-k</text>
        <text class="node-title" x="73" y="81" text-anchor="middle">Candidates</text>
        <text class="node-subtitle" x="73" y="100" text-anchor="middle">merged docs</text>
      </g>

      <g class="pulse d9" transform="translate(960 372)">
        <rect class="node-bg" width="166" height="120" rx="22" />
        <rect class="icon-bg icon-yellow" x="35" y="22" width="96" height="42" rx="10" />
        <line class="doc-line" x1="50" y1="38" x2="116" y2="38" />
        <line class="doc-line" x1="50" y1="52" x2="96" y2="52" />
        <text class="node-title-small" x="83" y="84" text-anchor="middle">Context Select</text>
        <text class="node-subtitle" x="83" y="103" text-anchor="middle">budget + sources</text>
      </g>

      <!-- Row 3: generation -->
      <g class="pulse d10" transform="translate(808 636)">
        <rect class="node-bg" width="168" height="116" rx="22" />
        <rect class="icon-bg icon-yellow" x="34" y="22" width="100" height="42" rx="10" />
        <line class="doc-line" x1="49" y1="38" x2="119" y2="38" />
        <line class="doc-line" x1="49" y1="52" x2="100" y2="52" />
        <text class="node-title" x="84" y="86" text-anchor="middle">Prompt</text>
        <text class="node-subtitle" x="84" y="105" text-anchor="middle">question + context</text>
      </g>

      <g class="pulse d11" transform="translate(1046 636)">
        <rect class="node-bg" width="156" height="116" rx="22" />
        <circle class="icon-bg icon-green" cx="78" cy="41" r="27" />
        <path d="M67 41 h22 M78 30 v22" stroke="#22c55e" stroke-width="3" stroke-linecap="round" />
        <text class="node-title" x="78" y="86" text-anchor="middle">LLM</text>
        <text class="node-subtitle" x="78" y="105" text-anchor="middle">stream optional</text>
      </g>

      <g class="pulse d11" transform="translate(1272 636)">
        <rect class="node-bg" width="166" height="116" rx="22" />
        <rect class="icon-bg icon-green" x="32" y="23" width="102" height="44" rx="11" />
        <line class="doc-line" x1="48" y1="39" x2="112" y2="39" />
        <line class="doc-line" x1="48" y1="54" x2="88" y2="54" />
        <text class="node-title" x="83" y="86" text-anchor="middle">Response</text>
        <text class="node-subtitle" x="83" y="105" text-anchor="middle">citations + sources<tspan class="cursor">|</tspan></text>
      </g>

      <g class="pulse d11" transform="translate(280 636)">
        <rect class="node-bg" width="160" height="116" rx="22" />
        <rect class="icon-bg icon-cyan" x="31" y="24" width="98" height="44" rx="11" />
        <text class="tiny" x="80" y="51" text-anchor="middle">SSE</text>
        <text class="node-title" x="80" y="86" text-anchor="middle">Stream</text>
        <text class="node-subtitle" x="80" y="105" text-anchor="middle">/query/stream</text>
      </g>

      <g class="pulse d11" transform="translate(510 636)">
        <rect class="node-bg" width="228" height="116" rx="22" />
        <rect class="icon-bg icon-rose" x="56" y="24" width="116" height="44" rx="11" />
        <text class="tiny" x="114" y="51" text-anchor="middle">self-rag</text>
        <text class="node-title" x="114" y="86" text-anchor="middle">Advanced Loop</text>
        <text class="node-subtitle" x="114" y="102" text-anchor="middle">gate / rewrite / critique</text>
        <text class="node-subtitle" x="114" y="114" text-anchor="middle">retry-refine or abstain</text>
      </g>
    </svg>
  </main>
</body>
</html>
