[pytest]
pythonpath = .
testpaths = tests
markers =
    unit: fast isolated tests for pure logic and local module behavior.
    integration: tests that exercise integration across modules/API/workflow layers.
    slow: tests that are heavier (DOCX/PDF parsing, end-to-end flows, model-like smoke paths).
    e2e: end-to-end scenarios that run full stacks or evaluation runner pipelines.
